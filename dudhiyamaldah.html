<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dudhiya Maldah - Bihar Smart Mango Knowledge Wall</title>
    <!-- We use the same CSS structure as your main app for visual consistency -->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container" style="max-width: 800px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px;">
    <a href="index.html" class="back-btn" style="text-decoration:none; color:#0F5132; font-weight:bold;">← Back To Gallery</a>
    
    <div class="hero-section" style="display: flex; gap: 20px; margin-top: 20px;">
        <img class="hero-image" src="img/dudhiyamaldah.png" alt="Dudhiya Maldah" style="width: 200px; border-radius: 8px;">
        <div>
            <h2 id="modal-title">Dudhiya Maldah</h2>
            <p>The legendary King of Mangoes from Digha, Patna, known for its milky aroma and melt-in-the-mouth texture.</p>
        </div>
    </div>

    <!-- Separate Charts Section -->
    <div class="chart-container" style="margin-top: 40px;">
        <h3>🧪 Sugar Profile Analysis (TSS Midpoint)</h3>
        <canvas id="tssChart"></canvas>
    </div>

    <div class="chart-container" style="margin-top: 40px;">
        <h3>🩸 Glycemic Index Spectrum (GI Value)</h3>
        <canvas id="giChart"></canvas>
    </div>
</div>

<script>
    // Data specifically for this variety to ensure the charts highlight "Dudhiya Maldah"
    const varietyName = "Dudhiya Maldah";
    
    const tssData = {
        labels: ['Dudhiya Maldah', 'Alphonso', 'Kesar', 'Dashehari', 'Totapuri'],
        values: [21.3, 21.0, 20.0, 19.0, 16.0]
    };

    const giData = {
        labels: ['Alphonso', 'Dashehari', 'Kesar', 'Dudhiya Maldah', 'Totapuri'],
        values: [56, 54, 53, 51, 51]
    };

    // Render TSS Chart
    new Chart(document.getElementById("tssChart"), {
        type: 'bar',
        data: {
            labels: tssData.labels,
            datasets: [{
                data: tssData.values,
                backgroundColor: tssData.labels.map(l => l === varietyName ? '#0F5132' : '#FFC107')
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // Render GI Chart
    new Chart(document.getElementById("giChart"), {
        type: 'bar',
        data: {
            labels: giData.labels,
            datasets: [{
                data: giData.values,
                backgroundColor: giData.labels.map(l => l === varietyName ? '#0F5132' : '#DEE2E6')
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
</script>
</body>
</html>
