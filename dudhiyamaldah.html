<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dudhiya Maldah - Bihar Smart Mango Knowledge Wall</title>
    <style>
        :root { --primary-green: #0F5132; --accent-gold: #FFC107; --soft-cream: #F8F9FA; }
        body { font-family: -apple-system, sans-serif; background-color: var(--soft-cream); padding: 1.5rem; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .chart-section { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #e9ecef; }
        .chart-wrapper { height: 300px; margin-bottom: 50px; }
        /* Metric Box Styling */
        .metric-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; padding: 15px; background: #fdfdfd; border-radius: 8px; border: 1px solid #eee; }
        .pill { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; border: 1px solid #ddd; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>

<div class="container">
    <section class="chart-section">
        <h3 style="color: var(--primary-green); text-align: center;">📊 Comparative Analytics</h3>

        <!-- Color Code Metrics -->
        <div class="metric-box">
            <span class="pill" style="background:#0F5132; color:white;">Target: Dudhiya Maldah</span>
            <span class="pill" style="background:#FFC107;">High Sugar</span>
            <span class="pill" style="background:#DC3545; color:white;">High GI</span>
        </div>

        <div class="chart-wrapper">
            <h4 style="text-align: center;">Sugar Profile (TSS Midpoint °Brix) 🥭</h4>
            <canvas id="tssChart"></canvas>
        </div>

        <div class="chart-wrapper">
            <h4 style="text-align: center;">Glycemic Index (GI) Spectrum 🩸</h4>
            <canvas id="giChart"></canvas>
        </div>
    </section>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        Chart.register(ChartDataLabels);
        
        // Data with Mango Icons
        const labels = ['Dudhiya Maldah 🥭', 'Alphonso 🥭', 'Kesar 🥭', 'Dashehari 🥭', 'Totapuri 🥭'];

        new Chart(document.getElementById('tssChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: [21.25, 21.0, 20.0, 19.0, 16.0],
                    backgroundColor: ['#0F5132', '#FFC107', '#FFC107', '#FFC107', '#FFC107']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'top' } } }
        });

        new Chart(document.getElementById('giChart'), {
            type: 'bar',
            data: {
                labels: ['Alphonso 🥭', 'Dashehari 🥭', 'Kesar 🥭', 'Dudhiya Maldah 🥭', 'Totapuri 🥭'],
                datasets: [{
                    data: [56, 54, 53, 51, 51],
                    backgroundColor: ['#DC3545', '#FFB100', '#FFB100', '#0F5132', '#FFB100']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'top' } } }
        });
    });
</script>
</body>
</html>
