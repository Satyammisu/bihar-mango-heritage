<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bihar Smart Mango Heritage</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1 id="main-headline">Bihar Smart Mango Knowledge Wall</h1>
        <div class="lang-controls">
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="hi">हिन्दी</button>
            <button class="lang-btn" data-lang="mai">मैथिली</button>
            <button class="lang-btn" data-lang="bho">भोजपुरी</button>
        </div>
    </header>

    <main id="gallery-grid" class="grid-container"></main>

    <div id="variety-modal" class="hidden">
        <div class="modal-content">
            <h2 id="modal-title">Variety Title</h2>
            <p id="modal-subheading">Nutritional & Quality Comparison Dashboard</p>
            
            <div class="audio-control-wrapper">
                <button id="btn-modal-audio">🎙️ Play Audio Guide</button>
                <button id="btn-modal-stop">⏹️ Stop</button>
            </div>

            <img id="modal-variety-img" src="" alt="Mango">
            <img id="modal-qr-img" src="" alt="QR Code">

            <table id="comparison-table">
                <thead>
                    <tr id="th-row">
                        <th id="th-variety">Variety</th>
                        <th id="th-tss">TSS Range (°Brix)</th>
                        <th id="th-gi">Glycemic Index (GI)</th>
                    </tr>
                </thead>
                <tbody id="comparison-body"></tbody>
            </table>

            <div class="chart-container">
                <h3 id="lbl-tss-chart-title"></h3>
                <canvas id="tssChart"></canvas>
            </div>
            <div class="chart-container">
                <h3 id="lbl-gi-chart-title"></h3>
                <canvas id="giChart"></canvas>
            </div>

            <button id="close-modal-btn">Close</button>
        </div>
    </div>

    <script src="js/mangoes.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
