<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bihar Smart Mango Knowledge Wall | Aam Mahotsav 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: #f5f7fa; overflow-x: hidden; }

        /* TOP BAR */
        .topbar { background: #1b5e20; color: white; padding: 12px 8%; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

        /* HERO */
        .hero { height: 90vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images/hero.jpg'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; text-align: center; color: white; }
        .hero-btn { display: inline-block; padding: 15px 35px; background: #ff9800; color: white; text-decoration: none; border-radius: 10px; font-weight: 700; margin-top: 20px; transition: 0.3s; cursor: pointer; border: none; font-size: 16px; }
        .hero-btn:hover { background: #e68900; }

        /* SECTIONS */
        .section { padding: 80px 8%; }
        .section-title { font-size: 42px; text-align: center; color: #2e7d32; margin-bottom: 40px; font-weight: 800; }
        
        /* MANGO GRID */
        .mango-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.4s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0,0,0,.15); }
        .card img { width: 100%; height: 260px; object-fit: cover; }
        .card-content { padding: 25px; }
        .btn { display: inline-block; padding: 12px 24px; background: #2e7d32; color: white; text-decoration: none; border-radius: 10px; margin-top: 15px; }

        /* QR GALLERY */
        .qr-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; text-align: center; }
        
        /* RESPONSIVE INPUT */
        #question { padding: 15px; width: min(600px, 90%); border-radius: 10px; border: 1px solid #ccc; }
        
        footer { background: #1b5e20; color: white; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="topbar">
        <div>🥭 Bihar Mango Heritage</div>
        <div>Department of Horticulture, Govt of Bihar</div>
    </div>

    <section class="hero">
        <div>
            <h1>Bihar Smart Mango Knowledge Wall</h1>
            <p>Experience the heritage of Aam Mahotsav 2026</p>
            
            <a href="#mangoes" class="hero-btn" id="enterOrchard">Enter The Orchard</a>
            <br><br>
            <button onclick="startExperience()" class="hero-btn">🎧 Start Experience</button>
        </div>
    </section>

    <section class="section" id="mangoes">
        <h2 class="section-title">Featured Varieties</h2>
        <div class="mango-grid" id="mangoGridContainer"></div>
    </section>

    <section class="section">
        <h2 class="section-title">Quick Access QR Gallery</h2>
        <div class="qr-gallery" id="qrGallery"></div>
    </section>

    <section class="section">
        <h2 class="section-title">AI Mango Mitra</h2>
        <div style="max-width: 800px; margin: auto; text-align: center; padding: 40px; background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <input type="text" id="question" placeholder="Ask a question about Bihar mangoes...">
            <button onclick="askMangoMitra()" class="btn">Ask Mitra</button>
            <div id="answer" style="margin-top:20px; font-weight:700;"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Department of Horticulture, Government of Bihar</p>
    </footer>

    <audio id="birdsAudio" loop>
        <source src="audio/birds.mp3" type="audio/mpeg">
    </audio>

    <script>
        const mangoData = [
            { name: "Zardalu", slug: "zardalu" },
            { name: "Maldah", slug: "maldah" },
            { name: "Langra", slug: "langra" },
            { name: "Gulab Khas", slug: "gulab-khas" }, 
            { name: "Bombai", slug: "bombai" }
        ];
        
        const grid = document.getElementById('mangoGridContainer');
        const qrGallery = document.getElementById('qrGallery');

        mangoData.forEach(m => {
            grid.innerHTML += `
                <div class="card">
                    <img src="images/${m.slug}.jpg" alt="${m.name}">
                    <div class="card-content">
                        <h3>${m.name}</h3>
                        <p>Authentic Bihar Variety</p>
                        <a href="${m.slug}.html" class="btn">Know More</a>
                    </div>
                </div>
            `;
            qrGallery.innerHTML += `
                <div>
                    <img src="qr/${m.slug}-qr.png" width="120" alt="${m.name} QR">
                    <p>${m.name}</p>
                </div>
            `;
        });

        function startExperience() {
            // Play Audio
            const audio = document.getElementById('birdsAudio');
            audio.play().catch(e => console.log("Audio play deferred"));

            // Speak Welcome
            const msg = new SpeechSynthesisUtterance("Welcome to Bihar Mango Heritage. Explore the rich mango traditions of Bihar.");
            speechSynthesis.speak(msg);

            // Navigate
            window.location.hash = '#mangoes';
        }
    </script>
    <script src="js/language.js"></script>
    <script src="js/mango-mitra.js"></script>
    <script src="js/orchard.js"></script>
</body>
</html>
