<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishnabhog Mango | Bihar Smart Mango Knowledge Wall</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#f5f7fa;
overflow-x:hidden;
color:#333;
}

/* ================= HERO ================= */

.hero{
height:100vh;

background:
linear-gradient(
rgba(0,0,0,0.30),
rgba(0,0,0,0.50)
),
url('images/krishnabhog.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
align-items:center;
text-align:center;

color:white;

position:relative;
}

/* Government Branding */

.govt{
position:absolute;
top:25px;
right:35px;

text-align:right;

font-size:14px;
font-weight:500;

line-height:1.8;
}

/* Event Badge */

.event{
position:absolute;
top:25px;
left:35px;

background:#ff9800;
color:white;

padding:12px 20px;

border-radius:40px;

font-weight:600;

box-shadow:0 5px 20px rgba(0,0,0,.25);
}

/* Hero Content */

.hero-content{
max-width:900px;
padding:20px;
}

.hero-content h1{
font-size:5rem;
font-weight:800;
margin-bottom:10px;
}

.hero-content h2{
font-size:2rem;
font-weight:500;
margin-bottom:20px;
}

.hero-content p{
font-size:1.2rem;
line-height:1.8;
}

/* ================= QUICK FACTS ================= */

.quick-facts{

max-width:1200px;

margin:-60px auto 40px;

background:white;

padding:25px;

border-radius:25px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

gap:20px;

position:relative;

z-index:100;

box-shadow:0 10px 35px rgba(0,0,0,.15);

}

.fact{
text-align:center;
}

.fact h3{
color:#ff9800;
margin-bottom:8px;
}

.fact p{
font-weight:600;
}

/* ================= CONTAINER ================= */

.container{
max-width:1200px;
margin:auto;
padding:0 20px 40px;
}

/* ================= CARDS ================= */

.card{
background:white;

padding:35px;

border-radius:25px;

margin-bottom:30px;

box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.section-title{
font-size:2rem;
margin-bottom:25px;
color:#2e7d32;
}

/* ================= INFO GRID ================= */

.info-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.info-box{

background:#fff8e7;

padding:20px;

border-radius:15px;

text-align:center;

transition:.3s;
}

.info-box:hover{
transform:translateY(-5px);
}

.info-box h3{
color:#ff9800;
margin-bottom:10px;
}

/* ================= SWEETNESS ================= */

.sweetness{

margin-top:30px;

font-size:1.4rem;

font-weight:600;

color:#ff9800;

line-height:2;
}

/* ================= GI BADGE ================= */

.gi{

display:inline-block;

background:#2e7d32;

color:white;

padding:14px 25px;

border-radius:40px;

margin-top:20px;

font-weight:600;
}

/* ================= BENEFITS ================= */

.benefits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.benefit{

background:white;

padding:25px;

border-radius:20px;

text-align:center;

box-shadow:0 4px 15px rgba(0,0,0,.08);

transition:.3s;
}

.benefit:hover{
transform:translateY(-6px);
}

.benefit h3{
margin-bottom:10px;
}

/* ================= STORY BOX ================= */

.story{

background:linear-gradient(
135deg,
#ff9800,
#f57c00
);

color:white;

padding:35px;

border-radius:20px;

line-height:2;

margin-top:30px;
}

/* ================= BUTTON ================= */

.btn{

display:inline-block;

padding:14px 30px;

background:#ff9800;

color:white;

text-decoration:none;

border-radius:10px;

font-weight:600;

margin-top:25px;
}

.btn:hover{
background:#f57c00;
}

/* ================= FOOTER ================= */

footer{

background:#2e7d32;

color:white;

text-align:center;

padding:40px;

margin-top:40px;
}

footer hr{
margin:20px 0;
border:1px solid rgba(255,255,255,.2);
}

/* ================= MOBILE ================= */

@media(max-width:768px){

.hero{
height:80vh;
}

.hero-content h1{
font-size:2.5rem;
}

.hero-content h2{
font-size:1.3rem;
}

.hero-content p{
font-size:1rem;
}

.event{
left:15px;
top:15px;
font-size:12px;
padding:10px 15px;
}

.govt{
right:15px;
top:15px;
font-size:11px;
}

.quick-facts{
margin-top:-40px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="event">
🥭 Aam Mahotsav 2026
</div>

<div class="govt">

🏛 Government of Bihar

<br>

🌿 Department of Horticulture

</div>

<div class="hero-content">

<h1>🥭 Krishnabhog Mango</h1>

<h2>कृष्णभोग आम</h2>

<p style="font-size:1.4rem;font-weight:600;">
The Royal Delight of Bihar
</p>

<p>
A premium mango variety prized for its rich, sweet flavour, deep golden colour, and exquisite aroma.
</p>

</div>

</section>
